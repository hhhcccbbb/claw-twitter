name: CLAW Auto-Tweet (OAuth2)

on:
  workflow_dispatch:   # 手动触发
  schedule:
    - cron: '0 8 * * *'   # 每天UTC 08:00 = 北京时间16:00

jobs:
  tweet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Post CLAW Thread (OAuth2)
        env:
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN_V2 }}
        run: python3 tweet_claw_v2.py
